name: Deploy Backend (Test Env)

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-test
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: test-environment

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Backend (Release)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o monera-server ./cmd/server/main.go

      - name: Prepare Deployment Package
        run: |
          mkdir -p deploy
          cp monera-server deploy/
          cp scripts/deploy-remote.sh deploy/
          tar -czf monera-digital.tar.gz -C deploy .

      - name: Copy package to server
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634 # v0.1.7
        with:
          host: ${{ secrets.TEST_ENV_HOST }}
          username: ${{ secrets.TEST_ENV_USER }}
          key: ${{ secrets.TEST_ENV_SSH_KEY }}
          source: "monera-digital.tar.gz"
          target: "/tmp"

      - name: Execute Remote Deploy
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.TEST_ENV_HOST }}
          username: ${{ secrets.TEST_ENV_USER }}
          key: ${{ secrets.TEST_ENV_SSH_KEY }}
          envs: DEPLOY_USER
          script: |
            sudo mkdir -p /opt/monera-digital
            sudo tar -xzf /tmp/monera-digital.tar.gz -C /opt/monera-digital
            sudo chown -R "${DEPLOY_USER}:${DEPLOY_USER}" /opt/monera-digital
            rm -f /tmp/monera-digital.tar.gz
            cd /opt/monera-digital
            bash ./deploy-remote.sh --env test --port 8086
        env:
          DEPLOY_USER: ${{ secrets.TEST_ENV_USER }}

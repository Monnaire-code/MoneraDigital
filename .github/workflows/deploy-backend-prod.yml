name: Deploy Backend to Production

on:
  workflow_dispatch:
    inputs:
      expected_migration_ceiling:
        description: Controlled migration ceiling for this release (must match the artifact)
        required: true
        type: string
        default: "060"

permissions:
  contents: read

concurrency:
  group: deploy-backend-production
  cancel-in-progress: false

jobs:
  deploy-production:
    name: Standard production deploy
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      ARTIFACT_REF: ${{ github.sha }}
      EXPECTED_MIGRATION_CEILING: ${{ inputs.expected_migration_ceiling }}
    steps:
      - name: Checkout approved main
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Validate production secrets and ceiling
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          CEILING: ${{ env.EXPECTED_MIGRATION_CEILING }}
        run: |
          set -euo pipefail
          [[ -n "$PROD_HOST" && -n "$PROD_USER" && -n "$PROD_SSH_KEY" ]]
          [[ "$CEILING" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{0,63}$ ]] || {
            echo "ERROR: expected_migration_ceiling is invalid" >&2
            exit 1
          }

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build standard release package
        run: |
          set -euo pipefail
          mkdir -p deploy/package
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${GITHUB_SHA}" \
            -o deploy/package/monera-server ./cmd/server
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${GITHUB_SHA}" \
            -o deploy/package/monera-migrate ./cmd/migrate
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -o deploy/package/company-fund-release ./cmd/company-fund-release
          gzip -f deploy/package/monera-server deploy/package/monera-migrate deploy/package/company-fund-release
          install -m 0755 scripts/deploy-remote.sh deploy/package/deploy-remote.sh
          printf '%s\n' "$GITHUB_SHA" > deploy/package/artifact-sha

      - name: Upload production package
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "deploy/package/*"
          target: "/tmp/monera-production-deploy/package"
          strip_components: 2

      - name: Execute standard production deploy
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          RELEASE_SHA: ${{ github.sha }}
          EXPECTED_MIGRATION_CEILING: ${{ env.EXPECTED_MIGRATION_CEILING }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 25m
          envs: RELEASE_SHA,EXPECTED_MIGRATION_CEILING
          script: |
            set -euo pipefail
            PACKAGE=/tmp/monera-production-deploy/package
            trap 'rm -rf /tmp/monera-production-deploy' EXIT
            "$PACKAGE/deploy-remote.sh" \
              --env production \
              --port 8081 \
              --release-mode standard \
              --artifact-sha "$RELEASE_SHA" \
              --expected-migration-ceiling "$EXPECTED_MIGRATION_CEILING"

name: Deploy Backend to Production

on:
  workflow_dispatch:
    inputs:
      release_phase:
        description: "受控发布阶段（按 056 → 057 → 058 → workers-off → server-dark → workers-on 顺序执行）"
        required: true
        type: choice
        options:
          - migration-056
          - migration-057
          - migration-058
          - workers-off-current
          - server-dark
          - workers-on-installed
      installed_server_sha:
        description: "仅 workers-off/current 时填写当前已安装 server 的完整 40 位 SHA"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-backend-production
  cancel-in-progress: false

jobs:
  controlled-production-phase:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - name: Checkout approved main
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Validate phase inputs and production secrets
        env:
          PHASE: ${{ inputs.release_phase }}
          INSTALLED_SHA: ${{ inputs.installed_server_sha }}
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          set -euo pipefail
          [[ -n "$PROD_HOST" && -n "$PROD_USER" && -n "$PROD_SSH_KEY" ]]
          if [[ "$PHASE" == "workers-off-current" ]]; then
            [[ "$INSTALLED_SHA" =~ ^[0-9a-f]{40}$ ]] || {
              echo "ERROR: $PHASE requires the installed 40-character server SHA" >&2
              exit 1
            }
          fi

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build immutable release package
        run: |
          set -euo pipefail
          mkdir -p deploy/package
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X main.version=${GITHUB_SHA}" -o deploy/package/monera-server ./cmd/server
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o deploy/package/monera-migrate ./cmd/migrate
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o deploy/package/company-fund-release ./cmd/company-fund-release
          gzip -f deploy/package/monera-server deploy/package/monera-migrate deploy/package/company-fund-release
          install -m 0755 scripts/deploy-remote.sh deploy/package/deploy-remote.sh
          printf '%s\n' "$GITHUB_SHA" > deploy/package/artifact-sha

      - name: Upload controlled package
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "deploy/package/*"
          target: "/tmp/monera-production-deploy/package"
          strip_components: 2

      - name: Execute exactly one controlled production phase
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          PHASE: ${{ inputs.release_phase }}
          INSTALLED_SHA: ${{ inputs.installed_server_sha }}
          RELEASE_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 25m
          envs: PHASE,INSTALLED_SHA,RELEASE_SHA
          script: |
            set -euo pipefail
            PACKAGE=/tmp/monera-production-deploy/package
            trap 'rm -rf /tmp/monera-production-deploy' EXIT
            case "$PHASE" in
              migration-056)
                "$PACKAGE/deploy-remote.sh" --env production --release-mode migration-only --artifact-sha "$RELEASE_SHA" --expected-migration-ceiling 056
                ;;
              migration-057)
                "$PACKAGE/deploy-remote.sh" --env production --release-mode migration-only --artifact-sha "$RELEASE_SHA" --expected-migration-ceiling 057
                ;;
              migration-058)
                "$PACKAGE/deploy-remote.sh" --env production --release-mode migration-only --artifact-sha "$RELEASE_SHA" --expected-migration-ceiling 058
                ;;
              workers-off-current)
                "$PACKAGE/deploy-remote.sh" --env production --release-mode workers-off-current --artifact-sha "$RELEASE_SHA" --installed-server-sha "$INSTALLED_SHA"
                ;;
              server-dark)
                "$PACKAGE/deploy-remote.sh" --env production --release-mode server-dark --artifact-sha "$RELEASE_SHA"
                ;;
              workers-on-installed)
                "$PACKAGE/deploy-remote.sh" --env production --release-mode workers-on-installed --artifact-sha "$RELEASE_SHA"
                ;;
              *) echo "ERROR: unsupported phase $PHASE" >&2; exit 1 ;;
            esac

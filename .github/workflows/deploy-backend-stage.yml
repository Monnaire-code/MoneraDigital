name: Deploy Backend to Stage
run-name: Deploy Backend Stage / push-${{ github.run_id }}

on:
  push:
    branches: [stage]

permissions:
  contents: read

concurrency:
  group: deploy-backend-stage
  cancel-in-progress: false

jobs:
  deploy-stage:
    name: Standard stage deploy
    if: github.ref == 'refs/heads/stage'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: stage
    env:
      ARTIFACT_REF: ${{ github.sha }}
      EXPECTED_MIGRATION_CEILING: "060"
    steps:
      - name: Checkout stage HEAD
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          ref: ${{ github.sha }}

      - name: Verify checkout SHA
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(git rev-parse HEAD)" == "$ARTIFACT_REF" ]] || {
            echo "ERROR: checkout SHA mismatch" >&2
            exit 1
          }

      - name: Verify stage secrets
        env:
          STAGE_HOST: ${{ secrets.STAGE_HOST }}
          STAGE_USER: ${{ secrets.STAGE_USER }}
          STAGE_SSH_KEY: ${{ secrets.STAGE_SSH_KEY }}
        run: |
          [[ -n "$STAGE_HOST" && -n "$STAGE_USER" && -n "$STAGE_SSH_KEY" ]] || {
            echo "ERROR: missing stage secrets" >&2
            exit 1
          }

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build standard release package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p deploy/package
          cp scripts/deploy-remote.sh deploy/package/deploy-remote.sh
          printf '%s\n' "$ARTIFACT_REF" > deploy/package/artifact-sha
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${ARTIFACT_REF}" \
            -o deploy/package/monera-migrate ./cmd/migrate
          gzip -f deploy/package/monera-migrate
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w" \
            -o deploy/package/company-fund-release ./cmd/company-fund-release
          gzip -f deploy/package/company-fund-release
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${ARTIFACT_REF}" \
            -o deploy/package/monera-server ./cmd/server
          gzip -f deploy/package/monera-server
          tar -czf deploy/release.tgz -C deploy/package .

      - name: Copy stage package
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.STAGE_HOST }}
          username: ${{ secrets.STAGE_USER }}
          key: ${{ secrets.STAGE_SSH_KEY }}
          source: deploy/release.tgz
          target: /tmp/monera-stage-deploy-${{ github.run_id }}-${{ github.run_attempt }}
          strip_components: 1

      - name: Execute standard stage deploy
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          ARTIFACT_REF: ${{ env.ARTIFACT_REF }}
          EXPECTED_MIGRATION_CEILING: ${{ env.EXPECTED_MIGRATION_CEILING }}
          DEPLOY_ROOT: /tmp/monera-stage-deploy-${{ github.run_id }}-${{ github.run_attempt }}
        with:
          host: ${{ secrets.STAGE_HOST }}
          username: ${{ secrets.STAGE_USER }}
          key: ${{ secrets.STAGE_SSH_KEY }}
          command_timeout: 20m
          envs: ARTIFACT_REF,EXPECTED_MIGRATION_CEILING,DEPLOY_ROOT
          script: |
            set -euo pipefail
            APP_DIR=/opt/monera-digital
            DEPLOY_SRC="$DEPLOY_ROOT/package"
            trap 'rm -rf "$DEPLOY_ROOT"' EXIT
            [[ -f "$DEPLOY_ROOT/release.tgz" ]] || { echo "ERROR: release archive missing" >&2; exit 1; }
            rm -rf "$DEPLOY_SRC"
            mkdir -p "$DEPLOY_SRC"
            tar -xzf "$DEPLOY_ROOT/release.tgz" -C "$DEPLOY_SRC"
            runner="$DEPLOY_SRC/deploy-remote.sh"
            [[ -f "$runner" ]] || { echo "ERROR: deploy runner missing" >&2; exit 1; }
            MONERA_DEPLOY_SRC="$DEPLOY_SRC" bash "$runner" \
              --env test \
              --release-mode standard \
              --artifact-sha "$ARTIFACT_REF" \
              --expected-migration-ceiling "$EXPECTED_MIGRATION_CEILING"

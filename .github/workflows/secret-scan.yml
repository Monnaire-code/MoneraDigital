name: secret-scan

# C-1 regression guard. Runs on every push and PR. The script is also wired
# into a pre-commit hook via scripts/install-hooks.sh.
on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so future audits can scan rotation evidence
      - name: Check for rotated credential literals and hardcoded DSNs
        run: bash scripts/check-secrets.sh
      - name: Confirm guard script itself is tracked
        run: |
          if ! git ls-files --error-unmatch scripts/check-secrets.sh >/dev/null 2>&1; then
            echo "::error::scripts/check-secrets.sh is not tracked in git."
            exit 1
          fi
